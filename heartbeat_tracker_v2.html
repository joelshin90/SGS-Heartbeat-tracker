<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGS HeartBeat Loss Tracker</title>
<style>
/* ══ 테마 변수 ══ */
:root {
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#22263a;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.18);
  --text:#e8eaf0;--text2:#8b90a0;--text3:#555a6e;
  --accent:#4f8ef7;--accent-bg:rgba(79,142,247,0.12);
  --red:#e24b4a;--red-bg:rgba(226,75,74,0.12);--red-t:#ff8080;
  --blue:#378add;--blue-bg:rgba(55,138,221,0.12);--blue-t:#7ab8f5;
  --green:#4caf7d;--green-bg:rgba(76,175,125,0.12);--green-t:#7dd4a8;
  --weekend:#c0392b;--weekend-bg:rgba(192,57,43,0.13);
  --patch-blue:#1a6fd4;--patch-red:#c0392b;--patch-gold:#d4a017;
  --radius:10px;--radius-sm:6px;
}
body.theme-light{
  --bg:#f0f2f5;--bg2:#ffffff;--bg3:#e8eaed;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.18);
  --text:#1a1d27;--text2:#555a6e;--text3:#8b90a0;
  --accent:#1a6fd4;--accent-bg:rgba(26,111,212,0.1);
  --red:#c0392b;--red-bg:rgba(192,57,43,0.1);--red-t:#a93226;
  --blue:#1a6fd4;--blue-bg:rgba(26,111,212,0.1);--blue-t:#1a5fa0;
  --green:#1e8449;--green-bg:rgba(30,132,73,0.1);--green-t:#196f3d;
  --weekend:#c0392b;--weekend-bg:rgba(192,57,43,0.1);
}
body.theme-colorblind{
  --bg:#1a1a2e;--bg2:#16213e;--bg3:#0f3460;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
  --text:#e0e0e0;--text2:#a0a0c0;--text3:#606080;
  --accent:#f5a623;--accent-bg:rgba(245,166,35,0.15);
  --red:#f5a623;--red-bg:rgba(245,166,35,0.15);--red-t:#f7c26b;
  --blue:#50fa7b;--blue-bg:rgba(80,250,123,0.12);--blue-t:#50fa7b;
  --green:#8be9fd;--green-bg:rgba(139,233,253,0.12);--green-t:#8be9fd;
  --weekend:#f5a623;--weekend-bg:rgba(245,166,35,0.15);
  --patch-blue:#f5a623;--patch-red:#50fa7b;--patch-gold:#8be9fd;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}

/* ── 로그인 ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:var(--bg2);border:0.5px solid var(--border2);border-radius:16px;padding:40px 36px;width:320px;text-align:center}
.login-box .logo{font-size:12px;font-weight:700;letter-spacing:.18em;color:var(--accent);margin-bottom:8px}
.login-box h1{font-size:20px;font-weight:600;margin-bottom:6px}
.login-box p{font-size:13px;color:var(--text2);margin-bottom:28px}
.login-box input[type=password]{width:100%;padding:11px 14px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--bg3);color:var(--text);font-size:15px;margin-bottom:12px;outline:none;transition:border-color .2s}
.login-box input[type=password]:focus{border-color:var(--accent)}
.err{font-size:12px;color:var(--red-t);margin-bottom:10px;min-height:16px}
.btn-login{width:100%;padding:11px;border-radius:var(--radius-sm);background:var(--accent);color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:opacity .2s}
.btn-login:hover{opacity:.85}

/* ── 헤더 ── */
#app{display:none}
header{background:var(--bg2);border-bottom:0.5px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:60}
header .logo-text{font-size:11px;font-weight:700;letter-spacing:.18em;color:var(--accent)}
header h1{font-size:15px;font-weight:600}
.conn-status{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.conn-dot{width:7px;height:7px;border-radius:50%;background:var(--text3)}
.conn-dot.online{background:var(--green);box-shadow:0 0 6px var(--green)}
.theme-btns{display:flex;gap:4px;margin-left:8px}
.theme-btn{padding:4px 8px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg3);color:var(--text2);font-size:11px;cursor:pointer;transition:all .15s}
.theme-btn:hover,.theme-btn.active{background:var(--accent-bg);color:var(--accent);border-color:var(--accent)}
.btn-logout{font-size:12px;color:var(--text3);background:none;border:0.5px solid var(--border);padding:4px 10px;border-radius:var(--radius-sm);cursor:pointer}
.btn-logout:hover{border-color:var(--border2);color:var(--text2)}

/* ── 공통 버튼 ── */
.btn{font-size:13px;padding:0 14px;height:32px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--bg3);color:var(--text);cursor:pointer;white-space:nowrap;transition:all .15s}
.btn:hover{background:var(--bg2);border-color:var(--accent);color:var(--accent)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
.btn.primary:hover{opacity:.85}
.btn.danger{background:var(--red-bg);color:var(--red-t);border-color:rgba(192,57,43,.3)}
.btn.danger:hover{opacity:.85}
.fld{display:flex;flex-direction:column;gap:3px}
.fld label{font-size:11px;color:var(--text3);font-weight:500;letter-spacing:.05em}
.fld select,.fld input[type=text],.fld input[type=date]{font-size:13px;padding:6px 10px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--bg3);color:var(--text);height:32px;outline:none;transition:border-color .2s}
.fld select:focus,.fld input:focus{border-color:var(--accent)}
.sep{width:1px;background:var(--border);align-self:stretch;margin:0 2px}

/* ── 메인 레이아웃 ── */
.main-wrap{padding:16px 20px;max-width:1800px;margin:0 auto}

/* ── 툴바 ── */
.toolbar{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;margin-bottom:14px}

/* ── 컨트롤 행 ── */
.ctrl-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:12px}
.year-nav{display:flex;align-items:center;gap:6px}
.year-nav button{width:26px;height:26px;border-radius:50%;border:0.5px solid var(--border2);background:var(--bg3);color:var(--text);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.year-nav button:hover{border-color:var(--accent);color:var(--accent)}
.year-label{font-size:15px;font-weight:600;min-width:48px;text-align:center}

/* ── Site 체크박스 필터 ── */
.site-filter-wrap{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.site-filter-wrap span{font-size:11px;color:var(--text3);font-weight:500;margin-right:2px}
.site-cb-label{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text2);cursor:pointer;padding:3px 8px;border:0.5px solid var(--border);border-radius:20px;transition:all .15s;user-select:none}
.site-cb-label:hover{border-color:var(--accent)}
.site-cb-label input{accent-color:var(--accent);width:13px;height:13px}
.site-cb-label.checked{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}

.legend{display:flex;gap:12px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}
.dot{width:10px;height:10px;border-radius:50%}
.dot-a{background:var(--red)}.dot-b{background:var(--blue)}.dot-c{background:var(--green)}
.toggle-wrap{display:flex;align-items:center;gap:6px}
.toggle-wrap label{font-size:12px;color:var(--text2);cursor:pointer}
input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:var(--accent)}

/* ── 통계 카드 ── */
.stats-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.stat-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 14px;flex:1;min-width:72px}
.stat-card .s-label{font-size:11px;color:var(--text3);margin-bottom:2px}
.stat-card .s-val{font-size:20px;font-weight:700}

/* ══ 패치노트 영역 ══ */
.patch-section{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden}
.patch-header{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:0.5px solid var(--border);cursor:pointer;user-select:none}
.patch-header h2{font-size:13px;font-weight:600;letter-spacing:.06em}
.patch-toggle-icon{margin-left:auto;font-size:14px;color:var(--text3);transition:transform .2s}
.patch-header.collapsed .patch-toggle-icon{transform:rotate(-90deg)}
.patch-show-toggle{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);cursor:pointer;padding:3px 10px;border:0.5px solid var(--border2);border-radius:20px;background:var(--bg3)}
.patch-show-toggle input{accent-color:var(--accent)}

.patch-body{padding:14px;overflow-x:auto}

/* 타임라인 레일 */
.patch-timeline{position:relative;min-height:160px;min-width:900px}
.rail{position:absolute;left:0;right:0;top:80px;height:4px;background:var(--border2);border-radius:2px}

/* 월 구분선 */
.rail-month-mark{position:absolute;top:0;height:100%;border-left:0.5px dashed var(--border);pointer-events:none}
.rail-month-label{position:absolute;top:84px;font-size:10px;color:var(--text3);transform:translateX(-50%);white-space:nowrap}

/* 패치 아이템 */
.patch-item{position:absolute;display:flex;flex-direction:column;align-items:center;cursor:pointer}
.patch-item.above{bottom:calc(100% - 80px);flex-direction:column-reverse}
.patch-item.below{top:80px}

.patch-connector{width:2px;background:var(--patch-blue);min-height:20px}
.patch-item.type-update .patch-connector{background:var(--patch-blue)}
.patch-item.type-hw .patch-connector{background:var(--patch-red)}
.patch-item.type-other .patch-connector{background:var(--patch-gold)}

.patch-arrow{width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent}
.patch-item.above .patch-arrow{border-top:10px solid var(--patch-blue)}
.patch-item.type-hw.above .patch-arrow{border-top-color:var(--patch-red)}
.patch-item.type-other.above .patch-arrow{border-top-color:var(--patch-gold)}
.patch-item.below .patch-arrow{border-bottom:10px solid var(--patch-blue)}
.patch-item.type-hw.below .patch-arrow{border-bottom-color:var(--patch-red)}
.patch-item.type-other.below .patch-arrow{border-bottom-color:var(--patch-gold)}

.patch-dot-rail{width:10px;height:10px;border-radius:50%;background:var(--patch-blue);border:2px solid var(--bg2);position:relative;z-index:2}
.patch-item.type-hw .patch-dot-rail{background:var(--patch-red)}
.patch-item.type-other .patch-dot-rail{background:var(--patch-gold)}

.patch-card{background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:6px 10px;max-width:130px;text-align:center;font-size:11px;line-height:1.4}
.patch-card .pc-tag{font-size:10px;font-weight:700;letter-spacing:.06em;margin-bottom:3px}
.patch-item.type-update .pc-tag{color:var(--blue-t)}
.patch-item.type-hw .pc-tag{color:var(--red-t)}
.patch-item.type-other .pc-tag{color:var(--accent)}
.patch-card .pc-title{color:var(--text);font-weight:500}
.patch-card .pc-date{font-size:10px;color:var(--text3);margin-top:2px}

/* 패치노트 숨김 시 그리드 위에 표시되는 마커 */
.grid-patch-marker{position:absolute;top:0;width:2px;z-index:5;pointer-events:all;cursor:pointer}
.grid-patch-marker .gpm-line{position:absolute;top:0;bottom:0;left:0;width:2px;opacity:.5}
.grid-patch-marker .gpm-tip{position:absolute;top:0;left:50%;transform:translateX(-50%);width:10px;height:10px;border-radius:50%;z-index:6}

/* 패치 추가 모달 */
.patch-add-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;padding:10px 14px;border-top:0.5px solid var(--border);background:var(--bg3)}

/* ══ 그리드 ══ */
.grid-wrap{overflow-x:auto;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg2);position:relative}
table{border-collapse:collapse;width:100%;min-width:960px}
.th-site{font-size:11px;font-weight:700;color:var(--text3);padding:8px 10px;text-align:center;border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border);white-space:nowrap;width:52px;letter-spacing:.06em}
.th-eq{font-size:11px;font-weight:700;color:var(--text3);padding:8px 10px;text-align:left;border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border);white-space:nowrap;width:132px}
.th-mon{font-size:11px;font-weight:600;color:var(--text3);padding:6px 0;text-align:center;border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border);min-width:74px;position:relative}
.td-site{font-size:11px;font-weight:700;color:var(--accent);padding:0 8px;text-align:center;border-right:0.5px solid var(--border);vertical-align:middle;white-space:nowrap;letter-spacing:.06em}
.td-eq{font-size:12px;color:var(--text2);padding:4px 10px;border-right:0.5px solid var(--border);white-space:nowrap}
.td-cell{border-right:0.5px solid var(--border);padding:0;vertical-align:middle;cursor:pointer;position:relative}
tr:last-child td{border-bottom:none}
tr:not(:last-child) td{border-bottom:0.5px solid var(--border)}
.site-group-first td{border-top:1.5px solid var(--border2)}
tr:hover .td-site,tr:hover .td-eq{background:var(--accent-bg)}

/* 타임라인 셀 */
.tl-cell{position:relative;width:100%;height:38px;cursor:pointer;transition:background .15s;overflow:visible}
.tl-cell:hover{background:var(--accent-bg)}
/* 주말 세로선 */
.tl-weekend{position:absolute;top:0;bottom:0;width:1.5px;pointer-events:none;z-index:1}
/* 패치 그리드 마커 */
.tl-patch-line{position:absolute;top:0;bottom:0;width:2px;z-index:3;pointer-events:all;cursor:pointer;opacity:.7;transition:opacity .2s}
.tl-patch-line:hover{opacity:1}
.tl-patch-line .tpl-dot{position:absolute;top:0;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;border:1.5px solid var(--bg2)}

.tl-star{position:absolute;top:50%;transform:translate(-50%,-50%);cursor:pointer;pointer-events:all;transition:transform .12s;z-index:4}
.tl-star:hover{transform:translate(-50%,-50%) scale(1.35)}
.tl-star.active-star{transform:translate(-50%,-50%) scale(1.45);filter:brightness(1.3)}
.tl-star svg{display:block}
.tl-label{position:absolute;top:2px;font-size:9px;color:var(--text3);transform:translateX(-50%);white-space:nowrap;pointer-events:none;z-index:5}

/* ── 정보 패널 ── */
.info-panel{position:fixed;z-index:400;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);padding:14px 16px;min-width:210px;max-width:260px;pointer-events:all;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.ip-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ip-title{font-size:13px;font-weight:700;letter-spacing:.06em}
.ip-close{background:none;border:none;font-size:16px;cursor:pointer;color:var(--text3);line-height:1;padding:0 2px}
.ip-close:hover{color:var(--text)}
.ip-row{display:flex;gap:8px;align-items:baseline;margin-bottom:5px}
.ip-label{font-size:11px;color:var(--text3);min-width:32px}
.ip-val{font-size:12px;color:var(--text)}
.ip-memo{font-size:12px;color:var(--text2);font-style:italic;line-height:1.4}
.ip-divider{border:none;border-top:0.5px solid var(--border);margin:8px 0}
.ip-del{width:100%;margin-top:2px}

/* ── 모달 ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg2);border-radius:var(--radius);border:0.5px solid var(--border2);padding:22px;width:380px;max-width:95vw;position:relative;max-height:90vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.6)}
.modal h3{font-size:15px;font-weight:600;margin-bottom:16px}
.modal .field{margin-bottom:12px}
.modal .field label{font-size:12px;color:var(--text3);display:block;margin-bottom:4px}
.modal .field select,.modal .field input,.modal .field textarea{width:100%;font-size:13px;padding:7px 10px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--bg3);color:var(--text);outline:none;transition:border-color .2s}
.modal .field select:focus,.modal .field input:focus,.modal .field textarea:focus{border-color:var(--accent)}
.modal .field textarea{height:70px;resize:vertical}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.modal-close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:18px;cursor:pointer;color:var(--text3)}
.modal-close:hover{color:var(--text)}

.empty-row td{font-size:13px;color:var(--text3);text-align:center;padding:32px}
.loading-overlay{display:flex;align-items:center;justify-content:center;padding:40px;gap:10px;color:var(--text3);font-size:13px}
.spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="logo">SGS KOREA</div>
    <h1>HeartBeat Tracker</h1>
    <p>PECVD 설비 Live Signal 이력 관리</p>
    <input type="password" id="pw-input" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="err" id="login-err"></div>
    <button class="btn-login" onclick="doLogin()">접속</button>
  </div>
</div>

<div id="app">
  <header>
    <div>
      <div class="logo-text">SGS KOREA</div>
      <h1>HeartBeat Loss Tracker</h1>
    </div>
    <div class="conn-status">
      <div class="conn-dot" id="conn-dot"></div>
      <span id="conn-text">연결 중...</span>
    </div>
    <div class="theme-btns">
      <button class="theme-btn active" onclick="setTheme('dark')" id="tb-dark">Dark</button>
      <button class="theme-btn" onclick="setTheme('light')" id="tb-light">Light</button>
      <button class="theme-btn" onclick="setTheme('colorblind')" id="tb-cb">색약</button>
    </div>
    <button class="btn-logout" onclick="doLogout()">로그아웃</button>
  </header>

  <div class="main-wrap">
    <!-- 입력 툴바 -->
    <div class="toolbar">
      <div class="fld"><label>SITE</label>
        <select id="inp-site" onchange="updateEqCombo()">
          <option value="">선택</option>
          <option>CXMT</option><option>NXCP</option><option>STIC</option>
          <option>SMBC</option><option>CXJD</option><option>MXSD</option>
          <option>YGXN</option><option>YMTC</option>
        </select>
      </div>
      <div class="fld"><label>호기</label>
        <select id="inp-eq" style="width:155px"><option value="">Site 먼저 선택</option></select>
      </div>
      <div class="fld"><label>PM</label>
        <select id="inp-pm"><option value="">선택</option><option>PMA</option><option>PMB</option><option>PMC</option></select>
      </div>
      <div class="fld"><label>발생일</label><input type="date" id="inp-date"></div>
      <div class="fld"><label>메모</label><input type="text" id="inp-memo" placeholder="간단 메모" style="width:160px"></div>
      <button class="btn primary" onclick="addEntry()">+ 추가</button>
      <div class="sep"></div>
      <button class="btn" onclick="exportJSON()">내보내기</button>
      <label class="btn" style="cursor:pointer">불러오기<input type="file" accept=".json" onchange="importJSON(event)" style="display:none"></label>
    </div>

    <!-- 컨트롤 행 -->
    <div class="ctrl-row">
      <div class="year-nav">
        <button onclick="changeYear(-1)">&#8249;</button>
        <span class="year-label" id="year-disp">2025</span>
        <button onclick="changeYear(1)">&#8250;</button>
      </div>
      <div class="sep" style="height:28px"></div>
      <div class="site-filter-wrap" id="site-filter-wrap">
        <span>SITE</span>
      </div>

/* 패치 타임라인 렌더 */
function renderPatchTimeline(){
  const tl=document.getElementById('patch-timeline');
  if(!tl)return;
  const rail=document.getElementById('patch-rail');
  // 기존 패치 아이템 제거
  tl.querySelectorAll('.patch-item,.rail-month-mark,.rail-month-label').forEach(e=>e.remove());

  const yearPatches=Object.entries(patches).filter(([k,p])=>new Date(p.date).getFullYear()===curYear);

  // 월 구분선 (타임라인 위)
  for(let m=0;m<12;m++){
    const leftPct=((m)/12)*100;
    const mark=document.createElement('div');
    mark.className='rail-month-mark';
    mark.style.left=leftPct+'%';
    mark.style.top='0';mark.style.bottom='0';
    tl.appendChild(mark);
    const lbl=document.createElement('div');
    lbl.className='rail-month-label';
    lbl.style.left=(leftPct+(100/24))+'%';
    lbl.textContent=(m+1)+'월';
    tl.appendChild(lbl);
  }

  const colorMap={update:'var(--patch-blue)',hw:'var(--patch-red)',other:'var(--patch-gold)'};

  yearPatches.forEach(([key,p])=>{
    const d=new Date(p.date);
    const dayOfYear=getDayOfYear(d,curYear);
    const totalDays=isLeap(curYear)?366:365;
    const leftPct=(dayOfYear/totalDays)*100;

    const item=document.createElement('div');
    item.className=`patch-item type-${p.type} ${p.pos||'above'}`;
    item.style.left=leftPct+'%';
    item.style.transform='translateX(-50%)';
    item.title=`${p.date}: ${p.title}`;
    item.onclick=()=>openPatchModal(key);

    const color=colorMap[p.type]||'var(--patch-blue)';
    const tagLabel=PATCH_TYPES[p.type]||p.type;

    if(p.pos==='above'){
      item.innerHTML=`
        <div class="patch-card">
          <div class="pc-tag">${tagLabel}</div>
          <div class="pc-title">${p.title}</div>
          <div class="pc-date">${p.date.slice(2).replace(/-/g,'.')}</div>
        </div>
        <div class="patch-connector" style="background:${color};flex:1;min-height:16px"></div>
        <div class="patch-arrow" style="border-top-color:${color.replace('var(--patch-blue)','#1a6fd4').replace('var(--patch-red)','#c0392b').replace('var(--patch-gold)','#d4a017')}"></div>
        <div class="patch-dot-rail" style="background:${color.replace('var(--patch-blue)','#1a6fd4').replace('var(--patch-red)','#c0392b').replace('var(--patch-gold)','#d4a017')}"></div>`;
    } else {
      item.innerHTML=`
        <div class="patch-dot-rail" style="background:${color.replace('var(--patch-blue)','#1a6fd4').replace('var(--patch-red)','#c0392b').replace('var(--patch-gold)','#d4a017')}"></div>
        <div class="patch-arrow" style="border-bottom-color:${color.replace('var(--patch-blue)','#1a6fd4').replace('var(--patch-red)','#c0392b').replace('var(--patch-gold)','#d4a017')}"></div>
        <div class="patch-connector" style="background:${color};flex:1;min-height:16px"></div>
        <div class="patch-card">
          <div class="pc-tag">${tagLabel}</div>
          <div class="pc-title">${p.title}</div>
          <div class="pc-date">${p.date.slice(2).replace(/-/g,'.')}</div>
        </div>`;
    }
    tl.appendChild(item);
  });
}

/* ── 날짜 유틸 ── */
function isLeap(y){return(y%4===0&&y%100!==0)||(y%400===0);}
function daysInMonth(m,y){const d=[31,isLeap(y)?29:28,31,30,31,30,31,31,30,31,30,31];return d[m];}
function getDayOfYear(date,year){
  let day=0;
  for(let m=0;m<date.getMonth();m++)day+=daysInMonth(m,year);
  day+=date.getDate();
  return day;
}
function dayToLeft(day,month,year){
  const days=daysInMonth(month,year);
  return 4+((day-0.5)/days)*92;
}
function stackOffset(idx,total){
  if(total===1)return'50%';
  const o=['28%','50%','72%','38%','62%'];
  return o[idx%o.length];
}

/* 주말 날짜 계산 */
function getWeekendPositions(month,year){
  const days=daysInMonth(month,year);
  const weekends=[];
  for(let d=1;d<=days;d++){
    const dow=new Date(year,month,d).getDay();
    if(dow===0||dow===6){
      weekends.push({day:d,isSun:dow===0,left:4+(d/days)*92});
    }
  }
  return weekends;
}

window.render=function(){

  // 연도 패치 (그리드 마커용)
  const totalDays=isLeap(curYear)?366:365;
  const yearPatches=Object.entries(patches).filter(([k,p])=>new Date(p.date).getFullYear()===curYear);
  const patchColorMap={update:'#1a6fd4',hw:'#c0392b',other:'#d4a017'};

  // 호기맵 구성
  const eqMap={};
  SITE_ORDER.forEach(site=>{
    if(!activeSites.has(site))return;
    getEqList(site).forEach(eq=>{eqMap[site+'||'+eq]={site,eq,months:{}};});
  });
  Object.entries(data).forEach(([key,d])=>{
    if(!activeSites.has(d.site))return;
    const y=new Date(d.date).getFullYear();
    if(y!==curYear)return;
    const mk=d.site+'||'+d.eq;
    if(!eqMap[mk])eqMap[mk]={site:d.site,eq:d.eq,months:{}};
    const m=new Date(d.date).getMonth();
    if(!eqMap[mk].months[m])eqMap[mk].months[m]=[];
    eqMap[mk].months[m].push({key,...d});
  });

  // 통계
  const allY=Object.values(data).filter(d=>new Date(d.date).getFullYear()===curYear&&activeSites.has(d.site));
  const pmC={PMA:0,PMB:0,PMC:0};
  allY.forEach(d=>{if(pmC[d.pm]!==undefined)pmC[d.pm]++;});
  const uniEq=new Set(allY.map(d=>d.site+'||'+d.eq)).size;
  document.getElementById('stats-bar').innerHTML=`
    <div class="stat-card"><div class="s-label">총 발생</div><div class="s-val">${allY.length}</div></div>
    <div class="stat-card"><div class="s-label">영향 호기</div><div class="s-val">${uniEq}</div></div>
    <div class="stat-card"><div class="s-label" style="color:var(--red-t)">PMA</div><div class="s-val">${pmC.PMA}</div></div>
    <div class="stat-card"><div class="s-label" style="color:var(--blue-t)">PMB</div><div class="s-val">${pmC.PMB}</div></div>
    <div class="stat-card"><div class="s-label" style="color:var(--green-t)">PMC</div><div class="s-val">${pmC.PMC}</div></div>`;

  // 행 정렬
  const rows=Object.values(eqMap)
    .sort((a,b)=>{const si=SITE_ORDER.indexOf(a.site)-SITE_ORDER.indexOf(b.site);return si||a.eq.localeCompare(b.eq);});

  /* Site별 행 수 계산 (rowspan용) */
  const siteRowCount={};
  rows.forEach(r=>{siteRowCount[r.site]=(siteRowCount[r.site]||0)+1;});
  const siteFirstSeen=new Set();

  let html=`<thead><tr>
    <th class="th-site">SITE</th><th class="th-eq">호기</th>
    ${Array.from({length:12},(_,i)=>`<th class="th-mon">${i+1}월</th>`).join('')}
  </tr></thead><tbody>`;

  rows.forEach(row=>{
    const isFirst=!siteFirstSeen.has(row.site);
    if(isFirst)siteFirstSeen.add(row.site);
    const sE=row.site.replace(/'/g,"\\'");
    const eE=row.eq.replace(/'/g,"\\'");

    html+=`<tr${isFirst?' class="site-group-first"':''}>`;
    // Site 셀: 첫 행만 rowspan
    if(isFirst){
      html+=`<td class="td-site" rowspan="${siteRowCount[row.site]}">${row.site}</td>`;
    }
    html+=`<td class="td-eq">${row.eq}</td>`;

    for(let m=0;m<12;m++){
      const evts=(row.months[m]||[]).slice().sort((a,b)=>new Date(a.date)-new Date(b.date));
      html+=`<td class="td-cell" onclick="openAdd('${sE}','${eE}',${m})"><div class="tl-cell">`;

      // 주말 세로선
      getWeekendPositions(m,curYear).forEach(({day,isSun,left})=>{
        html+=`<div class="tl-weekend" style="left:${left.toFixed(1)}%;background:${isSun?'rgba(192,57,43,0.5)':'rgba(192,57,43,0.25)'}"></div>`;
      });

      // 패치 그리드 마커 (패치노트 숨김 시)
      if(showMarker){
        yearPatches.forEach(([pk,p])=>{
          const pd=new Date(p.date);
          if(pd.getMonth()!==m)return;
          const left=dayToLeft(pd.getDate(),m,curYear);
          const col=patchColorMap[p.type]||'#888';
          html+=`<div class="tl-patch-line" style="left:${left.toFixed(1)}%;background:${col};" title="${p.date}: ${p.title}" onclick="event.stopPropagation();openPatchModal('${pk}')">
            <div class="tpl-dot" style="background:${col};border-color:var(--bg2)"></div>
          </div>`;
        });
      }

      // 별 마커
      const byDate={};
      evts.forEach(e=>{const day=new Date(e.date).getDate();if(!byDate[day])byDate[day]=[];byDate[day].push(e);});
      evts.forEach(e=>{
        const day=new Date(e.date).getDate();
        const left=dayToLeft(day,m,curYear);
        const grp=byDate[day];const idx=grp.indexOf(e);
        const top=stackOffset(idx,grp.length);
        const sz=detail?11:13;
        const col=PM_HEX[e.pm]||'#888';
        html+=`<span class="tl-star" data-key="${e.key}" style="left:${left.toFixed(1)}%;top:${top};" onclick="onStarClick(event,'${e.key}')">
          <svg width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="${col}"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
        </span>`;
        if(detail)html+=`<span class="tl-label" style="left:${left.toFixed(1)}%;top:2px">${day}</span>`;
      });
      html+=`</div></td>`;
    }
    html+=`</tr>`;
  });

  if(!rows.length)html+=`<tr class="empty-row"><td colspan="14">${curYear}년 데이터 없음</td></tr>`;
  html+=`</tbody>`;
  document.getElementById('main-table').innerHTML=html;
};

/* ── 셀 클릭 → 추가 모달 ── */
window.openAdd=function(site,eq,month){
  closePanel();
  const evts=Object.entries(data).filter(([k,d])=>{
    const dd=new Date(d.date);
    return d.site===site&&d.eq===eq&&dd.getFullYear()===curYear&&dd.getMonth()===month;
  });
  document.getElementById('modal-root').innerHTML=`
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <button class="modal-close" onclick="closeModal()">×</button>
        <h3>${site} / ${eq} — ${month+1}월 이력 추가</h3>
        <div class="field"><label>PM</label><select id="m-pm"><option>PMA</option><option>PMB</option><option>PMC</option></select></div>
        <div class="field"><label>발생일</label><input type="date" id="m-date" value="${curYear}-${String(month+1).padStart(2,'0')}-01"></div>
        <div class="field"><label>메모</label><textarea id="m-memo" placeholder="상세 내용, 원인, 조치사항"></textarea></div>
        <div class="modal-btns">
          <button class="btn" onclick="closeModal()">취소</button>
          <button class="btn primary" onclick="addFromModal('${site}','${eq}')">추가</button>
        </div>
        <div style="margin-top:14px;border-top:0.5px solid var(--border);padding-top:12px">
          <div style="font-size:12px;color:var(--text3);margin-bottom:8px">${month+1}월 기존 이력</div>
          ${evts.length?evts.map(([key,e])=>{
            const d=new Date(e.date);const col=PM_HEX[e.pm]||'#888';
            return`<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:12px">
              <span style="color:${col};font-weight:700">${e.pm}</span>
              <span style="color:var(--text3)">${d.getMonth()+1}/${d.getDate()}</span>
              <span style="flex:1;color:var(--text2)">${e.memo||''}</span>
              <button onclick="deleteEntry('${key}');closeModal()" class="btn danger" style="padding:0 8px;height:26px;font-size:11px">삭제</button>
            </div>`;}).join(''):'<div style="font-size:12px;color:var(--text3)">없음</div>'}
        </div>
      </div></div>`;
};
window.addFromModal=function(site,eq){
  const pm=document.getElementById('m-pm').value;
  const date=document.getElementById('m-date').value;
  const memo=document.getElementById('m-memo').value.trim();
  if(!date){alert('발생일을 입력하세요.');return;}
  push(ref(db,'events'),{site,eq,pm,date,memo,ts:Date.now()});
  closeModal();
};
window.closeModal=function(){document.getElementById('modal-root').innerHTML='';};

/* ── 내보내기/불러오기 ── */
window.exportJSON=function(){
  const arr=Object.entries(data).map(([key,d])=>({key,...d}));
  const blob=new Blob([JSON.stringify(arr,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`heartbeat_loss_${curYear}.json`;a.click();
};
window.importJSON=function(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const p=JSON.parse(ev.target.result);
      const imp=Array.isArray(p)?p:(p.data||[]);
      if(confirm(`${imp.length}건을 Firebase에 업로드할까요?`)){
        imp.forEach(d=>{const{key,...entry}=d;push(ref(db,'events'),{...entry,ts:entry.ts||Date.now()});});
      }
    }catch(err){alert('JSON 파싱 오류');}
  };
  r.readAsText(file);e.target.value='';
};

/* ── 초기화 ── */
const today=new Date();
document.getElementById('inp-date').value=today.toISOString().slice(0,10);
document.getElementById('year-disp').textContent=curYear;
renderSiteFilter();
</script>
