<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGS HeartBeat Loss Tracker</title>
<style>
  :root {
    --bg: #0f1117; --bg2: #1a1d27; --bg3: #22263a;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
    --text: #e8eaf0; --text2: #8b90a0; --text3: #555a6e;
    --accent: #4f8ef7; --accent-bg: rgba(79,142,247,0.12);
    --red: #e24b4a; --red-bg: rgba(226,75,74,0.12); --red-t: #ff8080;
    --blue: #378add; --blue-bg: rgba(55,138,221,0.12); --blue-t: #7ab8f5;
    --green: #4caf7d; --green-bg: rgba(76,175,125,0.12); --green-t: #7dd4a8;
    --radius: 10px; --radius-sm: 6px;
  }
  body.theme-light {
    --bg: #f0f2f5; --bg2: #ffffff; --bg3: #e4e7ed;
    --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.16);
    --text: #1a1d27; --text2: #4a5068; --text3: #8b90a0;
    --accent: #1a6fd4; --accent-bg: rgba(26,111,212,0.1);
    --red: #c0392b; --red-bg: rgba(192,57,43,0.1); --red-t: #922b21;
    --blue: #1a6fd4; --blue-bg: rgba(26,111,212,0.1); --blue-t: #154a8a;
    --green: #1e8449; --green-bg: rgba(30,132,73,0.1); --green-t: #196f3d;
  }
  body.theme-cb {
    --bg: #1c1c2e; --bg2: #16213e; --bg3: #0f3460;
    --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.22);
    --text: #e0e0e0; --text2: #a0b0c8; --text3: #5a7090;
    --accent: #f5a623; --accent-bg: rgba(245,166,35,0.15);
    --red: #f5a623; --red-bg: rgba(245,166,35,0.15); --red-t: #f7c26b;
    --blue: #56cfe1; --blue-bg: rgba(86,207,225,0.12); --blue-t: #56cfe1;
    --green: #9b59b6; --green-bg: rgba(155,89,182,0.12); --green-t: #c39bd3;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.25s, color 0.25s; }

  /* ── 로그인 화면 ── */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: var(--bg);
  }
  .login-box {
    background: var(--bg2); border: 0.5px solid var(--border2);
    border-radius: 16px; padding: 40px 36px; width: 320px; text-align: center;
  }
  .login-box .logo { font-size: 13px; font-weight: 600; letter-spacing: 0.15em; color: var(--accent); margin-bottom: 8px; }
  .login-box h1 { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .login-box p { font-size: 13px; color: var(--text2); margin-bottom: 28px; }
  .login-box input[type=password] {
    width: 100%; padding: 11px 14px; border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2); background: var(--bg3);
    color: var(--text); font-size: 15px; margin-bottom: 12px; outline: none;
    transition: border-color 0.2s;
  }
  .login-box input[type=password]:focus { border-color: var(--accent); }
  .login-box .err { font-size: 12px; color: var(--red-t); margin-bottom: 10px; min-height: 16px; }
  .btn-login {
    width: 100%; padding: 11px; border-radius: var(--radius-sm);
    background: var(--accent); color: #fff; font-size: 14px; font-weight: 600;
    border: none; cursor: pointer; transition: opacity 0.2s;
  }
  .btn-login:hover { opacity: 0.85; }

  /* ── 메인 앱 ── */
  #app { display: none; }
  header {
    background: var(--bg2); border-bottom: 0.5px solid var(--border);
    padding: 14px 24px; display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 50;
  }
  header .logo-text { font-size: 11px; font-weight: 700; letter-spacing: 0.18em; color: var(--accent); }
  header h1 { font-size: 15px; font-weight: 600; color: var(--text); }
  header .conn-status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
  .conn-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); }
  .conn-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .btn-logout { font-size: 12px; color: var(--text3); background: none; border: 0.5px solid var(--border); padding: 4px 10px; border-radius: var(--radius-sm); cursor: pointer; }
  .btn-logout:hover { border-color: var(--border2); color: var(--text2); }

  .main-wrap { padding: 20px 24px; max-width: 1600px; margin: 0 auto; }

  /* ── 입력 툴바 ── */
  .toolbar {
    background: var(--bg2); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end;
    margin-bottom: 16px;
  }
  .fld { display: flex; flex-direction: column; gap: 4px; }
  .fld label { font-size: 11px; color: var(--text3); font-weight: 500; letter-spacing: 0.05em; }
  .fld select, .fld input[type=text], .fld input[type=date] {
    font-size: 13px; padding: 7px 10px; border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2); background: var(--bg3);
    color: var(--text); height: 34px; outline: none;
    transition: border-color 0.2s;
  }
  .fld select:focus, .fld input:focus { border-color: var(--accent); }
  .fld select option { background: var(--bg3); }
  .sep { width: 1px; height: 34px; background: var(--border); align-self: flex-end; margin: 0 2px; }

  .btn { font-size: 13px; padding: 0 14px; height: 34px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--bg3); color: var(--text); cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .btn:hover { background: var(--bg2); border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
  .btn.primary:hover { opacity: 0.85; }
  .btn.danger { background: var(--red-bg); color: var(--red-t); border-color: rgba(226,75,74,0.3); }
  .btn.danger:hover { background: rgba(226,75,74,0.2); }

  /* ── 컨트롤 행 ── */
  .ctrl-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 14px; }
  .year-nav { display: flex; align-items: center; gap: 8px; }
  .year-nav button { width: 28px; height: 28px; border-radius: 50%; border: 0.5px solid var(--border2); background: var(--bg3); color: var(--text); cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .year-nav button:hover { border-color: var(--accent); color: var(--accent); }
  .year-label { font-size: 16px; font-weight: 600; color: var(--text); min-width: 52px; text-align: center; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-left: 8px; }
  .leg-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-a { background: var(--red); } .dot-b { background: var(--blue); } .dot-c { background: var(--green); }
  .toggle-wrap { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  .toggle-wrap label { font-size: 13px; color: var(--text2); cursor: pointer; }
  input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; accent-color: var(--accent); }

  /* ── 통계 카드 ── */
  .stats-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .stat-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 16px; flex: 1; min-width: 80px; }
  .stat-card .s-label { font-size: 11px; color: var(--text3); margin-bottom: 3px; letter-spacing: 0.04em; }
  .stat-card .s-val { font-size: 22px; font-weight: 700; color: var(--text); }

  /* ── 그리드 ── */
  .grid-wrap { overflow-x: auto; border: 0.5px solid var(--border); border-radius: var(--radius); background: var(--bg2); }
  table { border-collapse: collapse; width: 100%; min-width: 920px; }
  .th-site { font-size: 11px; font-weight: 600; color: var(--text3); padding: 10px 10px; text-align: left; border-bottom: 0.5px solid var(--border); border-right: 0.5px solid var(--border); white-space: nowrap; width: 52px; letter-spacing: 0.05em; }
  .th-eq { font-size: 11px; font-weight: 600; color: var(--text3); padding: 10px 10px; text-align: left; border-bottom: 0.5px solid var(--border); border-right: 0.5px solid var(--border); white-space: nowrap; width: 136px; letter-spacing: 0.05em; }
  .th-mon { font-size: 11px; font-weight: 600; color: var(--text3); padding: 8px 0; text-align: center; border-bottom: 0.5px solid var(--border); border-right: 0.5px solid var(--border); min-width: 72px; letter-spacing: 0.04em; }
  .td-site { font-size: 11px; font-weight: 700; color: var(--accent); padding: 0 8px; text-align: center; border-right: 0.5px solid var(--border); vertical-align: middle; white-space: nowrap; letter-spacing: 0.06em; }
  .td-eq { font-size: 12px; color: var(--text2); padding: 4px 10px; border-right: 0.5px solid var(--border); white-space: nowrap; }
  .td-cell { border-right: 0.5px solid var(--border); padding: 0; vertical-align: middle; cursor: pointer; }
  tr:last-child td { border-bottom: none; }
  tr:not(:last-child) td { border-bottom: 0.5px solid var(--border); }
  .site-group-first td { border-top: 1px solid var(--border2); }
  tr:hover .td-site, tr:hover .td-eq { background: rgba(79,142,247,0.04); }

  /* ── 타임라인 셀 ── */
  .tl-cell { position: relative; width: 100%; height: 38px; cursor: pointer; transition: background 0.15s; }
  .tl-cell:hover { background: rgba(79,142,247,0.06); }
  /* 주말 배경 블록 (토~일 연결) */
  .tl-weekend-block { position: absolute; top: 0; bottom: 0; background: rgba(150,160,180,0.13); pointer-events: none; z-index: 1; border-left: 0.5px solid rgba(150,160,180,0.2); border-right: 0.5px solid rgba(150,160,180,0.2); }
  /* 테마 버튼 */
  .theme-btns { display: flex; gap: 4px; margin-left: 8px; }
  .theme-btn { padding: 3px 9px; border: 0.5px solid var(--border2); border-radius: 20px; background: var(--bg3); color: var(--text2); font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .theme-btn:hover { border-color: var(--accent); color: var(--accent); }
  .theme-btn.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
  /* Site 체크박스 필터 */
  .site-filter-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .site-filter-row .sf-label { font-size: 11px; color: var(--text3); font-weight: 500; white-space: nowrap; }
  .site-cb { display: none; }
  .site-cb-pill { display: flex; align-items: center; gap: 4px; padding: 3px 10px; border: 0.5px solid var(--border2); border-radius: 20px; font-size: 12px; color: var(--text2); cursor: pointer; user-select: none; transition: all 0.15s; background: var(--bg3); }
  .site-cb-pill:hover { border-color: var(--accent); }
  .site-cb:checked + .site-cb-pill { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); font-weight: 600; }
  .tl-star { position: absolute; top: 50%; transform: translate(-50%,-50%); cursor: pointer; pointer-events: all; transition: transform 0.12s; }
  .tl-star:hover { transform: translate(-50%,-50%) scale(1.35); }
  .tl-star.active-star { transform: translate(-50%,-50%) scale(1.45); filter: brightness(1.3); }
  .tl-star svg { display: block; }
  .tl-label { position: absolute; top: 2px; font-size: 9px; color: var(--text3); transform: translateX(-50%); white-space: nowrap; pointer-events: none; line-height: 1; }

  /* ── 정보 패널 ── */
  .info-panel {
    position: fixed; z-index: 300; background: var(--bg2);
    border: 0.5px solid var(--border2); border-radius: var(--radius);
    padding: 14px 16px; min-width: 210px; max-width: 260px; pointer-events: all;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    animation: fadeIn 0.12s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
  .ip-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .ip-title { font-size: 13px; font-weight: 700; letter-spacing: 0.06em; }
  .ip-close { background: none; border: none; font-size: 16px; cursor: pointer; color: var(--text3); line-height: 1; padding: 0 2px; transition: color 0.15s; }
  .ip-close:hover { color: var(--text); }
  .ip-row { display: flex; gap: 8px; align-items: baseline; margin-bottom: 5px; }
  .ip-label { font-size: 11px; color: var(--text3); min-width: 32px; }
  .ip-val { font-size: 12px; color: var(--text); }
  .ip-memo { font-size: 12px; color: var(--text2); font-style: italic; line-height: 1.4; }
  .ip-divider { border: none; border-top: 0.5px solid var(--border); margin: 8px 0; }
  .ip-del { width: 100%; margin-top: 2px; }

  /* ── 모달 ── */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: flex; align-items: center; justify-content: center; }
  .modal { background: var(--bg2); border-radius: var(--radius); border: 0.5px solid var(--border2); padding: 22px; width: 360px; max-width: 95vw; position: relative; max-height: 90vh; overflow-y: auto; box-shadow: 0 16px 48px rgba(0,0,0,0.6); }
  .modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: var(--text); }
  .modal .field { margin-bottom: 12px; }
  .modal .field label { font-size: 12px; color: var(--text3); display: block; margin-bottom: 4px; }
  .modal .field select, .modal .field input, .modal .field textarea { width: 100%; font-size: 13px; padding: 8px 10px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--bg3); color: var(--text); outline: none; transition: border-color 0.2s; }
  .modal .field select:focus, .modal .field input:focus, .modal .field textarea:focus { border-color: var(--accent); }
  .modal .field textarea { height: 70px; resize: vertical; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .modal-close { position: absolute; top: 14px; right: 16px; background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text3); line-height: 1; }
  .modal-close:hover { color: var(--text); }

  /* ── 빈 행 / 로딩 ── */
  .empty-row td { font-size: 13px; color: var(--text3); text-align: center; padding: 32px; }
  .loading-overlay { display: flex; align-items: center; justify-content: center; padding: 40px; gap: 10px; color: var(--text3); font-size: 13px; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }


  /* ══ 패치노트 ══ */
  .patch-section { background:var(--bg2); border:0.5px solid var(--border); border-radius:var(--radius); margin-bottom:16px; overflow:hidden; }
  .patch-hdr { display:flex; align-items:center; gap:10px; padding:10px 16px; border-bottom:0.5px solid var(--border); user-select:none; }
  .patch-hdr h2 { font-size:13px; font-weight:600; letter-spacing:.06em; flex:1; cursor:pointer; }
  .patch-toggle { font-size:13px; color:var(--text3); cursor:pointer; transition:transform .2s; }
  .patch-toggle.closed { transform:rotate(-90deg); }
  .patch-body { padding:14px 16px; overflow-x:auto; }
  /* 타입 배지 */
  .pt-sw   { background:rgba(79,142,247,.18); color:#7ab8f5; }
  .pt-hw   { background:rgba(226,75,74,.18);  color:#ff8080; }
  .pt-both { background:rgba(76,175,125,.18); color:#7dd4a8; }
  .type-badge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; letter-spacing:.05em; white-space:nowrap; }
  /* 패치 카드 리스트 */
  .patch-list { display:flex; flex-direction:column; gap:8px; }
  .patch-card { background:var(--bg3); border:0.5px solid var(--border2); border-radius:var(--radius-sm); padding:10px 14px; display:flex; align-items:flex-start; gap:10px; }
  .patch-card:hover { border-color:var(--accent); }
  .pc-left { display:flex; flex-direction:column; gap:4px; min-width:90px; align-items:flex-start; }
  .pc-date { font-size:11px; color:var(--text3); }
  .pc-body { flex:1; }
  .pc-title { font-size:13px; font-weight:600; color:var(--text); margin-bottom:3px; }
  .pc-meta { font-size:11px; color:var(--text2); display:flex; gap:8px; flex-wrap:wrap; margin-bottom:2px; }
  .pc-desc { font-size:12px; color:var(--text2); font-style:italic; margin-top:4px; line-height:1.5; }
  .pc-actions { display:flex; gap:6px; flex-shrink:0; }
  .pc-btn { font-size:11px; padding:0 8px; height:24px; border-radius:var(--radius-sm); border:0.5px solid var(--border2); background:var(--bg2); color:var(--text2); cursor:pointer; transition:all .15s; }
  .pc-btn:hover { border-color:var(--accent); color:var(--accent); }
  .pc-btn.del { border-color:rgba(226,75,74,.3); color:var(--red-t); background:var(--red-bg); }
  .pc-btn.del:hover { opacity:.8; }
  /* 패치 모달 넓게 */
  .modal.wide { width:480px; }
  /* 인라인 그리드 (Site+호기+PM 나란히) */
  .field-row { display:flex; gap:8px; }
  .field-row .field { flex:1; }


  /* ── 패치 모달 적용 호기 다중행 ── */
  .target-list { display:flex; flex-direction:column; gap:6px; margin-top:6px; }
  .target-row { display:flex; align-items:center; gap:6px; background:var(--bg3); border:0.5px solid var(--border2); border-radius:var(--radius-sm); padding:6px 8px; }
  .target-row select { font-size:12px; padding:3px 6px; border-radius:var(--radius-sm); border:0.5px solid var(--border2); background:var(--bg2); color:var(--text); height:28px; flex:1; outline:none; min-width:0; }
  .target-row select:focus { border-color:var(--accent); }
  .target-row .tr-del { flex-shrink:0; width:24px; height:24px; border-radius:50%; border:0.5px solid rgba(226,75,74,.3); background:var(--red-bg); color:var(--red-t); font-size:14px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:opacity .15s; }
  .target-row .tr-del:hover { opacity:.7; }
  .target-add-row { display:flex; align-items:flex-end; gap:6px; }
  .target-add-row select { font-size:12px; padding:3px 6px; border-radius:var(--radius-sm); border:0.5px solid var(--border2); background:var(--bg3); color:var(--text); height:30px; flex:1; outline:none; min-width:0; }
  .target-add-row select:focus { border-color:var(--accent); }
  .btn-target-add { flex-shrink:0; height:30px; padding:0 12px; font-size:12px; font-weight:600; border-radius:var(--radius-sm); border:0.5px solid var(--accent); background:var(--accent-bg); color:var(--accent); cursor:pointer; white-space:nowrap; transition:all .15s; }
  .btn-target-add:hover { background:var(--accent); color:#fff; }

  /* ── 반응형 ── */
  @media (max-width: 600px) {
    .main-wrap { padding: 12px; }
    header { padding: 12px 14px; }
    .toolbar { gap: 8px; }
    .fld input[type=text] { width: 110px; }
  }
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo">SGS KOREA</div>
    <h1>HeartBeat Tracker</h1>
    <p>PECVD 설비 Live Signal 이력 관리</p>
    <input type="password" id="pw-input" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="err" id="login-err"></div>
    <button class="btn-login" onclick="doLogin()">접속</button>
  </div>
</div>

<!-- 메인 앱 -->
<div id="app">
  <header>
    <div>
      <div class="logo-text">SGS KOREA</div>
      <h1>HeartBeat Loss Tracker</h1>
    </div>
    <div class="conn-status">
      <div class="conn-dot" id="conn-dot"></div>
      <span id="conn-text">연결 중...</span>
    </div>
    <div class="theme-btns">
      <button class="theme-btn active" id="tb-dark"  onclick="setTheme('dark')">Dark</button>
      <button class="theme-btn"        id="tb-light" onclick="setTheme('light')">Light</button>
      <button class="theme-btn"        id="tb-cb"    onclick="setTheme('cb')">색약</button>
    </div>
    <button class="btn-logout" onclick="doLogout()">로그아웃</button>
  </header>

  <div class="main-wrap">
    <!-- 입력 툴바 -->
    <div class="toolbar">
      <div class="fld"><label>SITE</label>
        <select id="inp-site" onchange="updateEqCombo()">
          <option value="">선택</option>

      ? targets.map(t=>{

      <div class="pc-body">
        <div class="pc-title">${p.title}</div>

function initFirebase() {
  const connRef = ref(db, '.info/connected');

  });

  // 이벤트 데이터
  onValue(ref(db, 'events'), snap => {
    data = snap.val() || {};
    render();
    document.getElementById('loading-msg').style.display = 'none';
    document.getElementById('main-table').style.display = '';
  });

  // 커스텀 호기
  onValue(ref(db, 'customEq'), snap => {
    customEq = snap.val() || {};

  // 패치노트
  onValue(ref(db, 'patches'), snap => {
    patches = snap.val() || {};
    renderPatchList();
  });
}

/* ── 호기 목록 ── */
function getEqList(site) {
  if(!site) return [];
  const cust = customEq[site] ? Object.values(customEq[site]) : [];
  return [...(DEFAULT_EQ[site]||[]), ...cust];
}

window.updateEqCombo = function(sel) {
  const site = document.getElementById('inp-site').value;
  const el = document.getElementById('inp-eq');
  if(!site){ el.innerHTML='<option value="">Site 먼저 선택</option>'; return; }
  const list = getEqList(site);
  let html = '<option value="">호기 선택</option>';
  list.forEach(eq => { html += `<option value="${eq}"${sel===eq?' selected':''}>${eq}</option>`; });
  html += `<option value="__add__">+ 새 호기 추가...</option>`;
  el.innerHTML = html;
  el.onchange = function(){ if(this.value==='__add__') openAddEqModal(site); };
};

window.delCEQ = function(site, key) {

function starSVG(color, size) {
  return `<svg width="${size||13}" height="${size||13}" viewBox="0 0 24 24" fill="${color}"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>`;
}

function dayToLeft(day, month, year) {
  const leap = (year%4===0&&year%100!==0)||(year%400===0);
  let days = DAYS_IN_MONTH[month]; if(month===1&&leap) days=29;
  return 4+((day-0.5)/days)*92;
}

function stackOffset(idx, total) {
  if(total===1) return '50%';
  const o=['28%','50%','72%','35%','65%'];
  return o[idx%o.length];
}

window.render = function() {
  closePanel();
  renderSiteFilter();
  const detail = document.getElementById('detail-chk').checked;

  /* 주말 위치 계산 */
  function getWeekends(month, year) {
    const leap=(year%4===0&&year%100!==0)||(year%400===0);
    const days=[31,leap?29:28,31,30,31,30,31,31,30,31,30,31][month];
    const wends=[];
    for(let d=1;d<=days;d++){
      const dow=new Date(year,month,d).getDay();
      if(dow===0||dow===6) wends.push({d,sun:dow===0});
    }
    return {days, wends};
  }

  /* 호기맵 구성 */
  const eqMap = {};
  SITE_ORDER.forEach(site=>{
    if(!activeSites.has(site)) return;
    getEqList(site).forEach(eq=>{ eqMap[site+'||'+eq]={site,eq,months:{}}; });
  });
  Object.entries(data).forEach(([key,d])=>{
    if(!activeSites.has(d.site)) return;
    if(new Date(d.date).getFullYear()!==curYear) return;
    const mk=d.site+'||'+d.eq;
    if(!eqMap[mk]) eqMap[mk]={site:d.site,eq:d.eq,months:{}};
    const m=new Date(d.date).getMonth();
    if(!eqMap[mk].months[m]) eqMap[mk].months[m]=[];
    eqMap[mk].months[m].push({key,...d});
  });

  /* 통계 */
  const allY=Object.values(data).filter(d=>new Date(d.date).getFullYear()===curYear&&activeSites.has(d.site));
  const pmC={PMA:0,PMB:0,PMC:0};
  allY.forEach(d=>{if(pmC[d.pm]!==undefined)pmC[d.pm]++;});
  const uniEq=new Set(allY.map(d=>d.site+'||'+d.eq)).size;
  document.getElementById('stats-bar').innerHTML=`
    <div class="stat-card"><div class="s-label">총 발생</div><div class="s-val">${allY.length}</div></div>
    <div class="stat-card"><div class="s-label">영향 호기</div><div class="s-val">${uniEq}</div></div>
    <div class="stat-card"><div class="s-label" style="color:var(--red-t)">PMA</div><div class="s-val">${pmC.PMA}</div></div>
    <div class="stat-card"><div class="s-label" style="color:var(--blue-t)">PMB</div><div class="s-val">${pmC.PMB}</div></div>
    <div class="stat-card"><div class="s-label" style="color:var(--green-t)">PMC</div><div class="s-val">${pmC.PMC}</div></div>`;

  const rows=Object.values(eqMap)
    .sort((a,b)=>{const si=SITE_ORDER.indexOf(a.site)-SITE_ORDER.indexOf(b.site);return si||a.eq.localeCompare(b.eq);});

  /* Site별 rowspan 계산 */
  const siteCount={};
  rows.forEach(r=>{ siteCount[r.site]=(siteCount[r.site]||0)+1; });
  const siteRendered=new Set();

  let html=`<thead><tr>
    <th class="th-site">SITE</th><th class="th-eq">호기</th>
    ${MONTHS.map((_,i)=>`<th class="th-mon">${i+1}월</th>`).join('')}
  </tr></thead><tbody>`;

  let prevSite='';
  rows.forEach(row=>{
    const isFirst=row.site!==prevSite; prevSite=row.site;
    const sE=row.site.replace(/'/g,"\\'");
    const eE=row.eq.replace(/'/g,"\\'");
    html+=`<tr${isFirst?' class="site-group-first"':''}>`;

    /* Site 셀: 첫 행만 rowspan으로 병합 */
    if(!siteRendered.has(row.site)){
      siteRendered.add(row.site);
      html+=`<td class="td-site" rowspan="${siteCount[row.site]}">${row.site}</td>`;
    }
    html+=`<td class="td-eq">${row.eq}</td>`;

    for(let m=0;m<12;m++){
      const evts=(row.months[m]||[]).slice().sort((a,b)=>new Date(a.date)-new Date(b.date));
      const {days,wends}=getWeekends(m,curYear);
      html+=`<td class="td-cell" onclick="openAdd('${sE}','${eE}',${m})"><div class="tl-cell">`;

      /* 주말 블록: 토요일 시작~일요일 끝을 하나의 블록으로 연결 */
      (function(){
        let i=0;
        while(i<wends.length){
          const sat=wends[i];
          if(!sat.sun){ // 토요일
            const sun=wends[i+1]&&wends[i+1].sun ? wends[i+1] : null;
            const startDay=sat.d-0.5;
            const endDay=sun ? sun.d+0.5 : sat.d+0.5;
            const left=(4+(startDay/days)*92).toFixed(1);
            const right=(100-(4+(endDay/days)*92)).toFixed(1);
            html+=`<div class="tl-weekend-block" style="left:${left}%;right:${right}%"></div>`;
            i += sun ? 2 : 1;
          } else { // 일요일만 단독으로 있는 경우 (월초)
            const startDay=sat.d-0.5;
            const endDay=sat.d+0.5;
            const left=(4+(startDay/days)*92).toFixed(1);
            const right=(100-(4+(endDay/days)*92)).toFixed(1);
            html+=`<div class="tl-weekend-block" style="left:${left}%;right:${right}%"></div>`;
            i++;
          }
        }
      })();

      /* 별 마커 */
      const byDate={};
      evts.forEach(e=>{const day=new Date(e.date).getDate();if(!byDate[day])byDate[day]=[];byDate[day].push(e);});
      evts.forEach(e=>{
        const day=new Date(e.date).getDate();
        const left=dayToLeft(day,m,curYear);
        const grp=byDate[day];const idx=grp.indexOf(e);
        const top=stackOffset(idx,grp.length);
        const size=detail?11:13;
        html+=`<span class="tl-star" data-key="${e.key}" style="left:${left.toFixed(1)}%;top:${top};" onclick="onStarClick(event,'${e.key}')">${starSVG(PM_COLOR[e.pm],size)}</span>`;
        if(detail) html+=`<span class="tl-label" style="left:${left.toFixed(1)}%;top:2px">${day}</span>`;
      });
      html+=`</div></td>`;
    }
    html+=`</tr>`;
  });

  if(!rows.length) html+=`<tr class="empty-row"><td colspan="14">${curYear}년 데이터가 없습니다.</td></tr>`;
  html+=`</tbody>`;
  document.getElementById('main-table').innerHTML=html;
};

/* ── 셀 클릭 → 추가 모달 ── */
window.openAdd = function(site, eq, month) {
  closePanel();
  const evts = Object.entries(data).filter(([k,d])=>{
    const dd=new Date(d.date); return d.site===site&&d.eq===eq&&dd.getFullYear()===curYear&&dd.getMonth()===month;
  });
  document.getElementById('modal-root').innerHTML=`
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <button class="modal-close" onclick="closeModal()">×</button>
        <h3>${site} / ${eq} — ${month+1}월 이력 추가</h3>
        <div class="field"><label>PM</label>
          <select id="m-pm"><option>PMA</option><option>PMB</option><option>PMC</option></select></div>
        <div class="field"><label>발생일</label>
          <input type="date" id="m-date" value="${curYear}-${String(month+1).padStart(2,'0')}-01"></div>
        <div class="field"><label>메모</label>
          <textarea id="m-memo" placeholder="상세 내용, 원인, 조치사항 등"></textarea></div>
        <div class="modal-btns">
          <button class="btn" onclick="closeModal()">취소</button>
          <button class="btn primary" onclick="addFromModal('${site}','${eq}')">추가</button>
        </div>
        <div style="margin-top:14px;border-top:0.5px solid var(--border);padding-top:12px">
          <div style="font-size:12px;color:var(--text3);margin-bottom:8px">${month+1}월 기존 이력</div>
          ${evts.length ? evts.map(([key,e])=>{
            const d=new Date(e.date);
            return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:12px">
              <span style="color:${PM_COLOR[e.pm]};font-weight:700">${e.pm}</span>
              <span style="color:var(--text3)">${d.getMonth()+1}/${d.getDate()}</span>
              <span style="flex:1;color:var(--text2)">${e.memo||''}</span>
              <button onclick="deleteEntry('${key}');closeModal()" class="btn danger" style="padding:0 8px;height:26px;font-size:11px">삭제</button>
            </div>`;}).join('') : '<div style="font-size:12px;color:var(--text3)">없음</div>'}
        </div>
      </div>
    </div>`;
};

window.addFromModal = function(site, eq) {
  const pm   = document.getElementById('m-pm').value;
  const date = document.getElementById('m-date').value;
  const memo = document.getElementById('m-memo').value.trim();
  if(!date){ alert('발생일을 입력하세요.'); return; }
  push(ref(db,'events'), { site, eq, pm, date, memo, ts: Date.now() });
  closeModal();
};


/* ══ 패치노트 ══ */
const PATCH_TYPES = {
  sw:   { label:'S/W (SE)',        cls:'pt-sw'   },
  hw:   { label:'H/W (EE)',        cls:'pt-hw'   },
  both: { label:'S/W+H/W (Co-Work)', cls:'pt-both' }
};

function typeBadge(t) {
  const p = PATCH_TYPES[t] || PATCH_TYPES.sw;
  return `<span class="type-badge ${p.cls}">${p.label}</span>`;
}

window.togglePatch = function() {
  patchOpen = !patchOpen;
  document.getElementById('patch-body').style.display = patchOpen ? '' : 'none';
  document.getElementById('patch-toggle').className = 'patch-toggle' + (patchOpen ? '' : ' closed');
};

/* ══ 패치 모달 — 다중 호기 지원 ══ */

/* 모달 내 임시 targets 배열 */
let _pTargets = []; // [{site,eq,pm}, ...]

/* Site 콤보 옵션 HTML */
function _siteOpts(sel) {
  return ['','CXMT','NXCP','STIC','SMBC','CXJD','MXSD','YGXN','YMTC']
    .map(s=>`<option value="${s}"${s===sel?' selected':''}>${s||'전체/미지정'}</option>`).join('');
}
/* 호기 콤보 옵션 HTML */
function _eqOpts(site, sel) {
  const list = site ? getEqList(site) : [];
  let h = '<option value="">전체/미지정</option>';
  list.forEach(eq=>{ h+=`<option value="${eq}"${eq===sel?' selected':''}>${eq}</option>`; });
  return h;
}
/* PM 콤보 옵션 HTML */
function _pmOpts(sel) {
  return ['','PMA','PMB','PMC']
    .map(p=>`<option value="${p}"${p===sel?' selected':''}>${p||'전체/미지정'}</option>`).join('');
}

/* 타겟 목록 렌더 */
function _renderTargets() {
  const wrap = document.getElementById('p-target-list');
  if(!wrap) return;
  if(!_pTargets.length) {
    wrap.innerHTML='<div style="font-size:12px;color:var(--text3);padding:4px 0">아래에서 추가하세요.</div>';
    return;
  }
  wrap.innerHTML = _pTargets.map((t,i)=>`
    <div class="target-row" id="tr-${i}">
      <select onchange="_pTargets[${i}].site=this.value;_pTargets[${i}].eq='';_renderTargets()" style="flex:0.8">${_siteOpts(t.site)}</select>
      <select onchange="_pTargets[${i}].eq=this.value" style="flex:1.2">${_eqOpts(t.site,t.eq)}</select>
      <select onchange="_pTargets[${i}].pm=this.value" style="flex:0.7">${_pmOpts(t.pm)}</select>
      <button class="tr-del" onclick="_pTargets.splice(${i},1);_renderTargets()" title="삭제">×</button>
    </div>`).join('');
}

/* + 추가 버튼 클릭 */
window.patchAddTarget = function() {
  const site = document.getElementById('p-add-site').value;
  const eq   = document.getElementById('p-add-eq').value;
  const pm   = document.getElementById('p-add-pm').value;
  _pTargets.push({site,eq,pm});
  _renderTargets();
  /* 추가 후 입력 초기화 */
  document.getElementById('p-add-eq').innerHTML = _eqOpts(site,'');
};

/* 추가 행 Site 변경 시 호기 콤보 갱신 */
window.patchAddSiteChange = function() {
  const site = document.getElementById('p-add-site').value;
  document.getElementById('p-add-eq').innerHTML = _eqOpts(site,'');
};

/* 모달 열기 */
window.openPatchModal = function(existKey) {
  const ex = existKey ? patches[existKey] : null;
  const isEdit = !!ex;

  /* 기존 targets 복원 */
  _pTargets = ex?.targets ? JSON.parse(JSON.stringify(ex.targets)) : [];
  /* 구버전 호환: site/eq/pm 단일 필드 → targets 배열로 변환 */
  if(!_pTargets.length && ex?.site) _pTargets = [{site:ex.site||'',eq:ex.eq||'',pm:ex.pm||''}];

  document.getElementById('modal-root').innerHTML = `
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal wide">
        <button class="modal-close" onclick="closeModal()">×</button>
        <h3>${isEdit?'패치 수정':'패치 추가'}</h3>

        <div class="field">
          <label>제목 *</label>
          <input type="text" id="p-title" value="${ex?.title||''}" placeholder="예: PLC Driver Modify Version Upload">
        </div>
        <div class="field">
          <label>유형 *</label>
          <select id="p-type">
            <option value="sw"  ${(!ex||ex.type==='sw')?'selected':''}>S/W (SE)</option>
            <option value="hw"  ${ex?.type==='hw'?'selected':''}>H/W (EE)</option>
            <option value="both"${ex?.type==='both'?'selected':''}>S/W+H/W (Co-Work)</option>
          </select>
        </div>
        <div class="field">
          <label>날짜 *</label>
          <input type="date" id="p-date" value="${ex?.date||new Date().toISOString().slice(0,10)}">
        </div>

        <div class="field">
          <label>적용 호기 목록</label>
          <div class="target-list" id="p-target-list"></div>
        </div>

        <div class="field">
          <label style="color:var(--text3)">호기 추가</label>
          <div class="target-add-row">
            <select id="p-add-site" onchange="patchAddSiteChange()" style="flex:0.8">${_siteOpts('')}</select>
            <select id="p-add-eq" style="flex:1.2">${_eqOpts('','')}</select>
            <select id="p-add-pm" style="flex:0.7">${_pmOpts('')}</select>
            <button class="btn-target-add" onclick="patchAddTarget()">+ 추가</button>
          </div>
        </div>

        <div class="field">
          <label>상세 설명</label>
          <textarea id="p-desc" placeholder="패치 내용, 원인, 조치사항 등" style="height:64px">${ex?.desc||''}</textarea>
        </div>

        <div class="modal-btns">
          <button class="btn" onclick="closeModal()">취소</button>
          ${isEdit?`<button class="btn danger" onclick="deletePatch('${existKey}')">삭제</button>`:''}
          <button class="btn primary" onclick="savePatch('${existKey||''}')">저장</button>
        </div>
      </div>
    </div>`;

  _renderTargets();
};

window.patchSiteChange = function() {}; /* 미사용, 호환성 유지 */

window.savePatch = function(existKey) {
  const title = document.getElementById('p-title').value.trim();
  const type  = document.getElementById('p-type').value;
  const date  = document.getElementById('p-date').value;
  const desc  = document.getElementById('p-desc').value.trim();

  if(!title||!date){ alert('제목과 날짜는 필수입니다.'); return; }

  /* targets: 현재 _pTargets 상태 저장 */
  const targets = _pTargets.map(t=>({site:t.site||'',eq:t.eq||'',pm:t.pm||''}));

  /* 하위 호환: 첫 번째 항목을 site/eq/pm으로도 저장 */
  const first = targets[0]||{};
  const obj = { title, type, date, desc, targets, site:first.site||'', eq:first.eq||'', pm:first.pm||'', ts:Date.now() };

  if(existKey) set(ref(db,`patches/${existKey}`),obj);
  else push(ref(db,'patches'),obj);
  closeModal();
};

window.deletePatch = function(key) {
  if(confirm('이 패치 이력을 삭제할까요?')) {
    remove(ref(db, `patches/${key}`));
    closeModal();
  }
};

window.closeModal = function() { document.getElementById('modal-root').innerHTML=''; };

/* ── 내보내기 / 불러오기 ── */
window.exportJSON = function() {
  const arr = Object.entries(data).map(([key,d])=>({key,...d}));
  const blob = new Blob([JSON.stringify(arr,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`heartbeat_loss_${curYear}.json`;
  a.click();
};

window.importJSON = function(e) {
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const imp=JSON.parse(ev.target.result);
      const arr=Array.isArray(imp)?imp:(imp.data||[]);
      if(confirm(`${arr.length}건을 Firebase에 업로드할까요?`)){
        arr.forEach(d=>{
          const {key,...entry}=d;
          push(ref(db,'events'),{...entry, ts:entry.ts||Date.now()});
        });
      }
    }catch(err){alert('JSON 파싱 오류');}
  };
  r.readAsText(file);
  e.target.value='';
};

document.getElementById('inp-date').value=today.toISOString().slice(0,10);
